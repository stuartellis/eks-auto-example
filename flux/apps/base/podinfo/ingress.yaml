---
apiVersion: eks.amazonaws.com/v1
kind: IngressClassParams
metadata:
  name: podinfo-alb
  namespace: podinfo
spec:
  scheme: internet-facing
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: podinfo-alb
  namespace: podinfo
  annotations:
    # If an Ingress doesn't specify a class, it will use the Default
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: eks.amazonaws.com/alb
  parameters:
    apiGroup: eks.amazonaws.com
    kind: IngressClassParams
    name: podinfo-alb
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: podinfo-ingress
  namespace: podinfo
annotations:
  # Public ALB
  alb.ingress.kubernetes.io/scheme: internet-facing
  # Name of ALB
  alb.ingress.kubernetes.io/load-balancer-name: podinfo
  # Network
  alb.ingress.kubernetes.io/subnets: subnet-07b4d67d, subnet-5ac87816, subnet-eca28485
  # AWS resource tags for ALBs
  alb.ingress.kubernetes.io/tags: "Provisioner=k8s"
spec:
  ingressClassName: podinfo-alb
  rules:
    - http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: podinfo
                port:
                  number: 9898
